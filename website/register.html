<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | AutoParts Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: { 500: '#0066ff', 600: '#0052cc', 700: '#003d99' } },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                },
            },
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
    <header class="bg-white shadow-sm">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2">
                <img src="https://p6-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/856ffb6de9cb48bbb0ea4c76e0e782cf~tplv-a9rns2rl98-image.image?lk3s=8e244e95&amp;rcl=20260418110103A55FB85B9A4E74181EF9&amp;rrcfp=f06b921b&amp;x-expires=1779073300&amp;x-signature=T4sdFIYJPoEvrAYuMmih9WAdg%2B4%3D" alt="Logo" class="h-10">
                <span class="text-xl font-bold text-primary-600">AutoParts Global</span>
            </a>
            <a href="index.html" class="text-sm text-gray-600 hover:text-primary-600">Back to store</a>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">
            <div class="bg-white rounded-2xl shadow-xl p-8">
                <h1 class="text-2xl font-bold text-gray-900 text-center mb-2">Create your account</h1>
                <p class="text-gray-500 text-center text-sm mb-8">Shop faster, track orders, and save wishlists.</p>

                <div id="reg-error" class="hidden mb-4 p-3 rounded-md bg-red-50 text-red-700 text-sm" role="alert"></div>

                <form id="register-form" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="firstName" class="block text-sm font-medium text-gray-700 mb-1">First name</label>
                            <input type="text" id="firstName" name="firstName" required autocomplete="given-name"
                                class="w-full border border-gray-300 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-primary-500">
                        </div>
                        <div>
                            <label for="lastName" class="block text-sm font-medium text-gray-700 mb-1">Last name</label>
                            <input type="text" id="lastName" name="lastName" required autocomplete="family-name"
                                class="w-full border border-gray-300 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-primary-500">
                        </div>
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" id="email" name="email" required autocomplete="email"
                            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-primary-500"
                            placeholder="you@example.com">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="password" name="password" required autocomplete="new-password" minlength="6"
                            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-primary-500"
                            placeholder="At least 6 characters">
                    </div>
                    <div>
                        <label for="password2" class="block text-sm font-medium text-gray-700 mb-1">Confirm password</label>
                        <input type="password" id="password2" name="password2" required autocomplete="new-password"
                            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-primary-500">
                    </div>
                    <label class="flex items-start gap-2 text-sm text-gray-600">
                        <input type="checkbox" id="terms" required class="mt-1 rounded border-gray-300">
                        <span>I agree to the <a href="terms.html" class="text-primary-600 hover:underline" target="_blank" rel="noopener">Terms</a> and <a href="privacy.html" class="text-primary-600 hover:underline" target="_blank" rel="noopener">Privacy Policy</a>.</span>
                    </label>
                    <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-semibold py-3 rounded-lg transition-colors">
                        Create account
                    </button>
                </form>

                <p class="text-center text-sm text-gray-600 mt-8">
                    Already have an account?
                    <a href="login.html" class="text-primary-600 font-medium hover:underline">Sign in</a>
                </p>
            </div>
        </div>
    </main>

    <footer class="py-6 text-center text-sm text-gray-500">
        <a href="privacy.html" class="hover:text-primary-600">Privacy</a>
        <span class="mx-2">·</span>
        <a href="terms.html" class="hover:text-primary-600">Terms</a>
    </footer>

    <script src="js/auth.js"></script>
    <script>
        (function () {
            var form = document.getElementById('register-form');
            var err = document.getElementById('reg-error');

            function showError(msg) {
                err.textContent = msg;
                err.classList.remove('hidden');
            }
            function clearError() {
                err.classList.add('hidden');
            }

            if (APGAuth.isLoggedIn()) {
                if (APGAuth.getSession().role === 'admin') {
                    location.replace('admin.html');
                } else {
                    location.replace('account.html');
                }
                return;
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                clearError();
                var p = document.getElementById('password').value;
                var p2 = document.getElementById('password2').value;
                if (p !== p2) {
                    showError('Passwords do not match.');
                    return;
                }
                var r = APGAuth.register({
                    firstName: document.getElementById('firstName').value,
                    lastName: document.getElementById('lastName').value,
                    email: document.getElementById('email').value,
                    password: p
                });
                if (r.ok) {
                    location.href = 'account.html?welcome=1';
                } else {
                    showError(r.message || 'Registration failed.');
                }
            });
        })();
    </script>
</body>
</html>
