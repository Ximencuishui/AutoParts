<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | AutoParts Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: { 500: '#0066ff', 600: '#0052cc', 700: '#003d99' } },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                },
            },
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
    <header class="bg-white shadow-sm">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-2">
                <img src="https://p6-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/856ffb6de9cb48bbb0ea4c76e0e782cf~tplv-a9rns2rl98-image.image?lk3s=8e244e95&amp;rcl=20260418110103A55FB85B9A4E74181EF9&amp;rrcfp=f06b921b&amp;x-expires=1779073300&amp;x-signature=T4sdFIYJPoEvrAYuMmih9WAdg%2B4%3D" alt="Logo" class="h-10">
                <span class="text-xl font-bold text-primary-600">AutoParts Global</span>
            </a>
            <a href="index.html" class="text-sm text-gray-600 hover:text-primary-600">Back to store</a>
        </div>
    </header>

    <main class="flex-1 flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">
            <div class="bg-white rounded-2xl shadow-xl p-8">
                <h1 class="text-2xl font-bold text-gray-900 text-center mb-2">Welcome back</h1>
                <p class="text-gray-500 text-center text-sm mb-8">Sign in to manage orders and your profile.</p>

                <div id="login-error" class="hidden mb-4 p-3 rounded-md bg-red-50 text-red-700 text-sm" role="alert"></div>

                <form id="login-form" class="space-y-5">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" id="email" name="email" required autocomplete="email"
                            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-primary-500"
                            placeholder="you@example.com">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="password" name="password" required autocomplete="current-password"
                            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-primary-500"
                            placeholder="••••••••">
                    </div>
                    <div class="flex items-center justify-between text-sm">
                        <label class="flex items-center gap-2 text-gray-600">
                            <input type="checkbox" id="remember" class="rounded border-gray-300">
                            Remember me
                        </label>
                        <a href="account.html" class="text-primary-600 hover:underline">Forgot password?</a>
                    </div>
                    <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-semibold py-3 rounded-lg transition-colors">
                        Sign In
                    </button>
                </form>

                <div class="mt-6 p-4 bg-primary-50 rounded-lg border border-primary-100">
                    <label for="demo-account" class="block text-xs font-semibold text-primary-800 uppercase tracking-wide mb-2">Demo login (local only)</label>
                    <select id="demo-account" name="demo-account"
                        class="w-full border border-primary-200 rounded-lg px-3 py-2.5 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-primary-500">
                        <option value="">Choose Buyer or Admin…</option>
                        <option value="0">Buyer — store &amp; account (buyer@autoparts.global)</option>
                        <option value="1">Admin — dashboard (admin@autoparts.global)</option>
                    </select>
                    <p class="mt-2 text-xs text-gray-600">Passwords: <code class="bg-white px-1 rounded text-gray-800">buyer123</code> / <code class="bg-white px-1 rounded text-gray-800">admin123</code></p>
                </div>

                <p class="text-center text-sm text-gray-600 mt-8">
                    No account?
                    <a href="register.html" class="text-primary-600 font-medium hover:underline">Create one</a>
                </p>
            </div>
        </div>
    </main>

    <footer class="py-6 text-center text-sm text-gray-500">
        <a href="privacy.html" class="hover:text-primary-600">Privacy</a>
        <span class="mx-2">·</span>
        <a href="terms.html" class="hover:text-primary-600">Terms</a>
    </footer>

    <script src="js/auth.js"></script>
    <script>
        (function () {
            var form = document.getElementById('login-form');
            var err = document.getElementById('login-error');
            var email = document.getElementById('email');
            var password = document.getElementById('password');

            function showError(msg) {
                err.textContent = msg;
                err.classList.remove('hidden');
            }
            function clearError() {
                err.classList.add('hidden');
            }

            function fillCred(idx) {
                var u = APGAuth.BUILTIN[idx];
                email.value = u.email;
                password.value = u.password;
                clearError();
            }
            document.getElementById('demo-account').addEventListener('change', function () {
                var v = this.value;
                if (v === '') return;
                fillCred(parseInt(v, 10));
            });

            if (APGAuth.isLoggedIn()) {
                var s = APGAuth.getSession();
                if (s && s.role === 'admin') {
                    location.replace('admin.html');
                } else {
                    var next = safeNextPath(new URLSearchParams(location.search).get('next')) || 'account.html';
                    location.replace(next);
                }
                return;
            }

            function safeNextPath(raw) {
                if (!raw || typeof raw !== 'string') return null;
                var s = raw.trim();
                if (!s || s.indexOf('://') !== -1 || s.indexOf('//') === 0 || s.charAt(0) === '/') return null;
                if (!/^[a-zA-Z0-9._-]+\.html$/.test(s)) return null;
                return s;
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                clearError();
                var r = APGAuth.login(email.value, password.value);
                if (r.ok) {
                    if (r.role === 'admin') {
                        location.href = 'admin.html';
                        return;
                    }
                    var next = safeNextPath(new URLSearchParams(location.search).get('next')) || 'account.html';
                    location.href = next;
                } else {
                    showError(r.message || 'Sign in failed.');
                }
            });
        })();
    </script>
</body>
</html>
