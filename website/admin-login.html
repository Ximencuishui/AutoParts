<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | AutoParts Global</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#e6f0ff',
                            100: '#b3d1ff',
                            200: '#80b3ff',
                            300: '#4d94ff',
                            400: '#1a75ff',
                            500: '#0066ff',
                            600: '#0052cc',
                            700: '#003d99',
                            800: '#002966',
                            900: '#001433',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                },
            },
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
        }
        
        .login-container {
            background-image: linear-gradient(135deg, #0066ff 0%, #003d99 100%);
        }
        
        .form-input:focus {
            border-color: #0066ff;
            box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4" data-admin-page="login">
    <div class="login-container w-full max-w-md rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
        <!-- Left Side (Brand) -->
        <div class="hidden md:flex md:w-1/2 bg-primary-700 p-8 text-white flex-col justify-between">
            <div>
                <div class="flex items-center space-x-2 mb-8">
                    <img src="https://p6-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/856ffb6de9cb48bbb0ea4c76e0e782cf~tplv-a9rns2rl98-image.image?lk3s=8e244e95&amp;rcl=20260418110103A55FB85B9A4E74181EF9&amp;rrcfp=f06b921b&amp;x-expires=1779073300&amp;x-signature=T4sdFIYJPoEvrAYuMmih9WAdg%2B4%3D" alt="AutoParts Global Logo" class="h-10 bg-white p-1 rounded">
                    <span class="text-2xl font-bold">AutoParts Global</span>
                </div>
                <h1 class="text-3xl font-bold mb-4" data-i18n="login.brand_title">Admin Dashboard</h1>
                <p class="text-primary-100" data-i18n="login.brand_desc">Manage your products, orders, and customers with our powerful admin panel.</p>
            </div>
            <div class="mt-12">
                <p class="text-sm text-primary-200" data-i18n="login.copyright">© 2023 AutoParts Global. All rights reserved.</p>
            </div>
        </div>
        
        <!-- Right Side (Form) -->
        <div class="w-full md:w-1/2 bg-white p-8 md:p-12">
            <div class="flex justify-end gap-1 mb-4">
                <button type="button" data-admin-lang="zh" class="px-3 py-1.5 text-xs font-medium rounded-md transition-colors bg-gray-800 text-gray-300 hover:bg-gray-600">中文</button>
                <button type="button" data-admin-lang="en" class="px-3 py-1.5 text-xs font-medium rounded-md transition-colors bg-gray-800 text-gray-300 hover:bg-gray-600">English</button>
            </div>
            <div class="md:hidden flex items-center space-x-2 mb-6">
                <img src="https://p6-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/856ffb6de9cb48bbb0ea4c76e0e782cf~tplv-a9rns2rl98-image.image?lk3s=8e244e95&amp;rcl=20260418110103A55FB85B9A4E74181EF9&amp;rrcfp=f06b921b&amp;x-expires=1779073300&amp;x-signature=T4sdFIYJPoEvrAYuMmih9WAdg%2B4%3D" alt="AutoParts Global Logo" class="h-8">
                <span class="text-xl font-bold text-primary-600">AutoParts Global</span>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-6" data-i18n="login.form_title">Sign in to your account</h2>
            <form id="login-form">
                <div class="mb-4">
                    <label for="email" class="block text-gray-700 text-sm font-medium mb-2" data-i18n="login.email">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" id="email" name="email" class="form-input w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:outline-none" placeholder="you@example.com" required>
                    </div>
                </div>
                <div class="mb-6">
                    <label for="password" class="block text-gray-700 text-sm font-medium mb-2" data-i18n="login.password">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="password" name="password" class="form-input w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:outline-none" placeholder="••••••••" required>
                         <span class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400">
                            <i class="fas fa-eye-slash" id="toggle-password"></i>
                        </span>
                    </div>
                </div>
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-gray-300 rounded">
                        <label for="remember-me" class="ml-2 block text-sm text-gray-700" data-i18n="login.remember">Remember me</label>
                    </div>
                    <a href="#" class="text-sm text-primary-600 hover:text-primary-500" data-i18n="login.forgot">Forgot password?</a>
                </div>
                <div id="admin-login-error" class="hidden mb-4 p-3 rounded-md bg-red-50 text-red-700 text-sm" role="alert"></div>
                <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-semibold py-2 px-4 rounded-md transition-colors flex items-center justify-center">
                    <i class="fas fa-sign-in-alt mr-2"></i>
                    <span data-i18n="login.submit">Sign In</span>
                </button>
            </form>
            <p class="mt-4 text-xs text-gray-500"><span data-i18n="login.demo_hint">Demo admin:</span> <code class="bg-gray-100 px-1 rounded">admin@autoparts.global</code> / <code class="bg-gray-100 px-1 rounded">admin123</code></p>
            <button type="button" id="fill-admin-demo" class="mt-2 text-sm text-primary-600 hover:text-primary-800 font-medium" data-i18n="login.fill_demo">Fill admin credentials</button>
        </div>
    </div>

    <script src="js/admin-i18n.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (window.APGAdminI18n) {
                APGAdminI18n.init();
            }

            var errEl = document.getElementById('admin-login-error');
            var emailEl = document.getElementById('email');
            var passEl = document.getElementById('password');

            function showErr(msg) {
                errEl.textContent = msg;
                errEl.classList.remove('hidden');
            }
            function clearErr() {
                errEl.classList.add('hidden');
            }

            if (window.APGAuth && APGAuth.isLoggedIn() && APGAuth.getSession().role === 'admin') {
                window.location.replace('admin.html');
                return;
            }

            document.getElementById('fill-admin-demo').addEventListener('click', function () {
                var u = APGAuth.BUILTIN[1];
                emailEl.value = u.email;
                passEl.value = u.password;
                clearErr();
            });

            var togglePassword = document.getElementById('toggle-password');
            togglePassword.addEventListener('click', function () {
                var type = passEl.getAttribute('type') === 'password' ? 'text' : 'password';
                passEl.setAttribute('type', type);
                togglePassword.classList.toggle('fa-eye');
                togglePassword.classList.toggle('fa-eye-slash');
            });

            document.getElementById('login-form').addEventListener('submit', function (e) {
                e.preventDefault();
                clearErr();
                var r = APGAuth.loginAdmin(emailEl.value, passEl.value);
                if (r.ok) {
                    window.location.href = 'admin.html';
                } else {
                    showErr(r.message || 'Invalid email or password.');
                }
            });
        });
    </script>
</body>
</html>
